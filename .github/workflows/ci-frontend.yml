name: CI Frontend

on:
  push:
    branches: [main]
    paths:
      - "apps/frontend/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "turbo.json"
  pull_request:
    branches: [main]
    paths:
      - "apps/frontend/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "turbo.json"

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.4.0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter frontend lint

      - name: Check format
        run: pnpm --filter frontend format

      - name: Type check
        run: pnpm --filter frontend check-types

      - name: Build
        run: pnpm --filter frontend build
