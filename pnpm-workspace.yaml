# 定义工作空间中的包
packages:
  - "apps/*"
  - "packages/*"
  - "docs/*"

# 允许构建的依赖包
allowBuilds:
  "@parcel/watcher": true
  "@scarf/scarf": true
  esbuild: true
  sharp: true
  unrs-resolver: true
  vue-demi: true

# 定义依赖包版本
catalogs:
  # 公共依赖包版本
  dev:
    "@supabase/ssr": ^0.12.0
    "@supabase/supabase-js": ^2.108.2
    "@types/node": ^25.9.3
    oxfmt: ^0.55.0
    oxlint: ^1.70.0
    typescript: ^6.0.3
    zod: ^4.4.3

  # 后端依赖包版本
  backend:
    "@faker-js/faker": ^10.5.0
    "@mikro-orm/cli": ^7.1.4
    "@mikro-orm/core": ^7.1.5
    "@mikro-orm/decorators": ^7.1.5
    "@mikro-orm/migrations": ^7.1.4
    "@mikro-orm/nestjs": ^7.0.2
    "@mikro-orm/postgresql": ^7.1.4
    "@mikro-orm/reflection": ^7.1.5
    "@mikro-orm/seeder": ^7.1.5
    "@nestjs/common": ^11.1.27
    "@nestjs/config": ^4.0.4
    "@nestjs/core": ^11.1.27
    "@nestjs/platform-express": ^11.1.27
    "@nestjs/swagger": ^11.4.5
    class-transformer: ^0.5.1
    class-validator: ^0.15.1
    lru-cache: ^11.5.2
    nestjs-pino: ^4.6.1
    pino-http: ^11.0.0
    reflect-metadata: ^0.2.2
    rxjs: ^7.8.2
    tsx: ^4.22.4

  # 前端依赖包版本
  frontend:
    "@fontsource-variable/public-sans": ^5.2.7
    "@fontsource/jetbrains-mono": ^5.2.8
    "@nuxt/fonts": ^0.14.0
    "@nuxt/image": ^2.0.0
    "@nuxt/ui": ^4.9.0
    "@nuxtjs/i18n": ^10.4.0
    echarts: ^6.1.0
    nuxt: ^4.4.8
    tailwindcss: ^4.3.1
    vue: ^3.5.38
    vue-echarts: ^8.0.1
    vue-router: ^5.1.0
    vue-tsc: ^3.3.5

  # 测试依赖包版本
  test:
    "@nuxt/test-utils": ^4.0.3
    "@vue/test-utils": ^2.4.11
    happy-dom: ^20.10.6
    playwright-core: ^1.61.1
    vitest: ^4.1.9

  # 日志依赖包版本
  logger:
    pino: ^10.3.1
    pino-pretty: ^13.1.3
